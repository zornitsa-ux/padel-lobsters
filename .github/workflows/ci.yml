# =============================================================================
#  CI Pipeline — runs on every pull request and push to main.
#
#  What it checks:
#    1. Formatting — is the code formatted with Prettier?
#    2. Lint       — does ESLint find any errors? (warnings are allowed)
#    3. Build      — does `vite build` succeed?
#
#  All three must pass before a PR can be merged (once branch protection
#  is enabled — see CONTRIBUTING.md).
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        # Currently informational — 15 pre-existing errors in the codebase.
        # Once those are fixed, remove continue-on-error to make lint blocking.
        # Reduce --max-warnings over time as you fix existing warnings (~144).
        continue-on-error: true
        run: npm run lint -- --max-warnings 150

      - name: Build
        run: npm run build
        env:
          # Dummy values so vite build doesn't fail on missing env vars.
          # The build only bundles the references; it doesn't call Supabase.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
