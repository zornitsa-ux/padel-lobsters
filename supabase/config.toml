# =============================================================================
#  Supabase Local Development Configuration
#
#  This file configures the local Supabase stack (Postgres, Auth, Edge Functions)
#  that runs via Docker. Use `supabase start` to spin it up.
#
#  Docs: https://supabase.com/docs/guides/local-development
# =============================================================================

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
# Wildcards so any path under the dev origin (notably /auth/confirm with
# its query string) passes the redirect-URL allow-list. Without this,
# GoTrue silently rejects custom emailRedirectTo values and falls back
# to site_url — which can produce malformed links if a template tries
# to append to .RedirectTo.
additional_redirect_urls = [
  "http://127.0.0.1:5173/**",
  "http://localhost:5173/**",
  "https://127.0.0.1:5173",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Magic-link template override. The default `{{ .ConfirmationURL }}` macro
# builds against GoTrue's external URL (http://127.0.0.1:54321), but Kong
# only forwards /auth/v1/* — the bare /verify path 404s locally. This
# template redirects through the SPA's /auth/confirm route, which calls
# supabase.auth.verifyOtp() itself. Same template works in production.
[auth.email.template.magic_link]
subject = "Sign in to Padel Lobsters"
content_path = "./supabase/templates/magic_link.html"

# Email-change confirmation. Same Kong-prefix workaround as magic_link.
# With double_confirm_changes=true (see above) this template is sent to
# BOTH the current and new addresses; each link redeems the appropriate
# side via supabase.auth.verifyOtp({ type: 'email_change' }).
[auth.email.template.email_change]
subject = "Confirm your Padel Lobsters email change"
content_path = "./supabase/templates/email_change.html"

# Custom access token hook. Lives in the public schema (see migration
# 20260528000000_magic_link_auth.sql). Injects {role, device_trusted}
# claims into every token issuance regardless of sign-in method
# (PIN, magic link, future OAuth) so authz reads the same JWT shape
# for all paths.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.verify-pin]
verify_jwt = false

[functions.send-pin-email]
verify_jwt = false

[analytics]
enabled = false
